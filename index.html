<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D 列印排隊系統</title>
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <style>
    html, body { height: 100%; background: #0b1220; color: #e5e7eb; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; }
    .btn { background: #0ea5e9; color: white; padding: 10px 14px; border-radius: 10px; }
    .btn[disabled] { opacity: .5; }
    .btn-outline { background: transparent; border: 1px solid #374151; color: #e5e7eb; padding: 10px 14px; border-radius: 10px; }
    .chip { background: #1f2937; padding: 4px 10px; border-radius: 999px; font-size: 12px; }
    .dragging { opacity: 0.5; }
    input, select, textarea {
      background: #0b1220; border:1px solid #334155; border-radius:10px; padding:10px; color:#e5e7eb;
    }
    .badge { background:#10b98122; color:#10b981; padding:2px 8px; border-radius:8px; font-size:12px; }
    .badge-warn { background:#f59e0b22; color:#f59e0b; padding:2px 8px; border-radius:8px; font-size:12px; }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-4xl mx-auto p-4 space-y-4">
    <header class="flex items-center justify-between">
      <h1 class="text-2xl font-bold">3D 列印排隊系統</h1>
      <div class="flex items-center gap-2">
        <button id="btnNotify" class="btn-outline">開啟完成通知</button>
        <button id="btnInstall" class="btn">安裝 App</button>
      </div>
    </header>
    <section class="card p-4 space-y-3">
      <div class="flex flex-col md:flex-row gap-3">
        <input id="inputText" class="flex-1" placeholder="描述（件名/學號/需求）" />
        <input id="inputEta" type="number" min="1" class="w-32" placeholder="ETA 分鐘" />
        <input id="inputMaterial" placeholder="材料/顏色（選填）" class="w-40" />
        <button id="btnAdd" class="btn">新增</button>
      </div>
      <div class="text-sm text-gray-400">提示：可拖曳卡片左邊把手排序。開始/完成會記錄時間。</div>
      <div class="flex gap-2 items-center">
        <span class="chip">目前隊列 ID：<span id="queueIdLabel">default</span></span>
        <span class="chip">管理 PIN：<span id="pinState">未啟用</span></span>
        <button id="btnSetPin" class="btn-outline">設定/移除 PIN</button>
      </div>
    </section>
    <section class="card p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold">等待列</h2>
        <div class="flex gap-2">
          <button id="btnStartNext" class="btn">開始下一位</button>
          <button id="btnExportCSV" class="btn-outline">匯出 CSV</button>
          <button id="btnExportDone" class="btn-outline">匯出完成紀錄（區間）</button>
        </div>
      </div>
      <div id="list" class="space-y-3"></div>
    </section>
    <section class="card p-4">
      <h2 class="font-semibold mb-2">目前進行中</h2>
      <div id="serving" class="space-y-3"></div>
    </section>
    <footer class="text-xs text-gray-400 text-center py-6">
      若顯示權限不足，請檢查 Firestore 規則與是否啟用匿名登入。建議使用 HTTPS。
    </footer>
  </div>
  <script>
    // 你可以改這裡的參數
    const QUEUE_ID = 'default';
    let ADMIN_PIN = localStorage.getItem('ADMIN_PIN') || '';
    const COLLECTION = `queue_3dprint_${QUEUE_ID}`;
    // Firebase 設定（已套用你的新專案 config）
    const firebaseConfig = {
      apiKey: "AIzaSyBbkowDGM8mdu6r7wh3DivcdxZ4ZVH6y9U",
      authDomain: "d-print-final.firebaseapp.com",
      projectId: "d-print-final",
      storageBucket: "d-print-final.firebasestorage.app",
      messagingSenderId: "902101487410",
      appId: "1:902101487410:web:aa8e021e5bb628671d512b",
      measurementId: "G-MR3GF5RZY4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    auth.onAuthStateChanged(u => {
      if (!u) auth.signInAnonymously().catch(console.error);
    });
    // PWA 安裝
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('btnInstall').disabled = false;
    });
    document.getElementById('btnInstall').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('btnInstall').disabled = true;
    });
    // 通知
    const btnNotify = document.getElementById('btnNotify');
    btnNotify.addEventListener('click', async () => {
      if (!('Notification' in window)) {
        alert('此瀏覽器不支援通知');
        return;
      }
      const perm = await Notification.requestPermission();
      if (perm === 'granted') {
        btnNotify.textContent = '通知已啟用';
        btnNotify.disabled = true;
        new Notification('通知已啟用', { body: '完成時會顯示提醒' });
      }
    });
    // PIN 管理
    const pinState = document.getElementById('pinState');
    function refreshPinState() {
      pinState.textContent = ADMIN_PIN ? '已設定' : '未啟用';
    }
    refreshPinState();
    document.getElementById('btnSetPin').addEventListener('click', () => {
      const val = prompt('輸入 4~8 位數字作為管理 PIN；留空以移除：', ADMIN_PIN);
      if (val === null) return;
      const trimmed = (val || '').trim();
      if (trimmed && !/^\d{4,8}$/.test(trimmed)) {
        alert('請輸入 4~8 位數字');
        return;
      }
      ADMIN_PIN = trimmed;
      if (ADMIN_PIN) localStorage.setItem('ADMIN_PIN', ADMIN_PIN);
      else localStorage.removeItem('ADMIN_PIN');
      refreshPinState();
    });
    // UI 元件
    const $ = sel => document.querySelector(sel);
    const listEl = $('#list');
    const servingEl = $('#serving');
    $('#queueIdLabel').textContent = QUEUE_ID;
    // 新增
    $('#btnAdd').addEventListener('click', async () => {
      const text = $('#inputText').value.trim();
      const etaMin = parseInt($('#inputEta').value || '0', 10);
      const material = $('#inputMaterial').value.trim();
      if (!text) { alert('請輸入描述'); return; }
      const order = Date.now();
      const doc = {
        text,
        etaMin: isNaN(etaMin) || etaMin <= 0 ? null : etaMin,
        material: material || null,
        status: 'waiting',
        order,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        startedAt: null,
        finishedAt: null
      };
      try {
        await db.collection(COLLECTION).add(doc);
        $('#inputText').value = '';
        $('#inputEta').value = '';
        $('#inputMaterial').value = '';
      } catch (e) {
        console.error(e);
        alert('新增失敗：' + e.message);
      }
    });
    // 拖曳排序
    let dragId = null;
    function makeDraggable(card, id) {
      const handle = card.querySelector('[data-handle]');
      handle.setAttribute('draggable', 'true');
      handle.addEventListener('dragstart', () => { dragId = id; card.classList.add('dragging'); });
      handle.addEventListener('dragend', () => { dragId = null; card.classList.remove('dragging'); });
    }
    listEl.addEventListener('dragover', (e) => {
      e.preventDefault();
      const afterEl = getDragAfterElement(listEl, e.clientY);
      const dragging = document.querySelector('.dragging')?.parentElement;
      if (!dragging) return;
      if (afterEl == null) listEl.appendChild(dragging);
      else listEl.insertBefore(dragging, afterEl);
    });
    listEl.addEventListener('drop', async () => {
      const ids = [...listEl.querySelectorAll('[data-id]')].map(el => el.dataset.id);
      const batch = db.batch();
      const base = Date.now();
      ids.forEach((id, idx) => {
        batch.update(db.collection(COLLECTION).doc(id), { order: base + idx });
      });
      try { await batch.commit(); } catch (e) { console.error(e); }
    });
    function getDragAfterElement(container, y) {
      const els = [...container.querySelectorAll('[data-id]')].filter(el => !el.querySelector('.dragging'));
      let closest = { offset: Number.POSITIVE_INFINITY, element: null };
      els.forEach(el => {
        const box = el.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && Math.abs(offset) < closest.offset) closest = { offset: Math.abs(offset), element: el };
      });
      return closest.element;
    }
    // 監聽列表
    db.collection(COLLECTION)
      .orderBy('status')
      .orderBy('order')
      .onSnapshot((snap) => {
        listEl.innerHTML = '';
        servingEl.innerHTML = '';
        snap.forEach(doc => {
          const d = doc.data();
          const id = doc.id;
          const card = renderCard(id, d);
          if (d.status === 'serving') {
            servingEl.appendChild(card);
          } else if (d.status === 'waiting') {
            listEl.appendChild(card);
          }
        });
      }, (err) => {
        console.error(err);
        alert('讀取清單失敗：' + err.message);
      });
    function renderCard(id, d) {
      const li = document.createElement('div');
      li.dataset.id = id;
      li.className = 'card p-3';
      const etaText = d.etaMin ? `預估 ${d.etaMin} 分鐘` : '未估時';
      const matText = d.material ? `・材料 ${d.material}` : '';
      const timeInfo = renderTimeInfo(d);
      li.innerHTML = `
        <div class="flex items-start gap-3">
          <div data-handle class="cursor-move select-none px-2 py-1 text-gray-400">☰</div>
          <div class="flex-1">
            <div class="flex items-center justify-between gap-2">
              <div class="font-semibold">${escapeHtml(d.text || '(無標題)')}</div>
              <div class="flex items-center gap-2">
                ${d.status === 'waiting' ? `<span class="badge-warn">等待中</span>` : d.status === 'serving' ? `<span class="badge">進行中</span>` : `<span class="badge">完成</span>`}
              </div>
            </div>
            <div class="text-sm text-gray-400 mt-1">${etaText}${matText}・${timeInfo}</div>
            <div class="flex gap-2 mt-3">
              ${d.status === 'waiting' ? `
                <button class="btn" data-action="start">開始</button>
                <button class="btn-outline" data-action="remove">刪除</button>
              ` : d.status === 'serving' ? `
                <button class="btn" data-action="done">完成</button>
                <button class="btn-outline" data-action="pause">退回等待</button>
              ` : `
                <button class="btn-outline" data-action="restore">復原到等待</button>
                <button class="btn-outline" data-action="remove">刪除</button>
              `}
            </div>
          </div>
        </div>
      `;
      makeDraggable(li, id);
      li.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => onAction(id, d, btn.dataset.action));
      });
      return li;
    }
    function renderTimeInfo(d) {
      const fmt = ts => ts ? new Date(ts.seconds ? ts.seconds * 1000 : ts).toLocaleString() : '-';
      if (d.status === 'waiting') {
        return `建立：${fmt(d.createdAt)}`;
      }
      if (d.status === 'serving') {
        let eta = '';
        if (d.startedAt && d.etaMin) {
          const start = (d.startedAt.seconds ? d.startedAt.seconds * 1000 : d.startedAt);
          const end = start + d.etaMin * 60000;
          const remainMin = Math.max(0, Math.ceil((end - Date.now()) / 60000));
          eta = `・預估剩餘 ${remainMin} 分`;
        }
        return `開始：${fmt(d.startedAt)}${eta}`;
      }
      let cost = '';
      if (d.startedAt && d.finishedAt) {
        const ms = (d.finishedAt.seconds ? d.finishedAt.seconds * 1000 : d.finishedAt) - (d.startedAt.seconds ? d.startedAt.seconds * 1000 : d.startedAt);
        const min = Math.round(ms / 60000);
        cost = `・耗時 ${min} 分`;
      }
      return `完成：${fmt(d.finishedAt)}${cost}`;
    }

    // ======= 修改這裡：只有刪除/退回/復原才需要 PIN =======
    async function onAction(id, d, action) {
      // 只有這三個操作需要 PIN 驗證
      const needPin = (action === 'remove' || action === 'pause' || action === 'restore');
      if (needPin && ADMIN_PIN) {
        const input = prompt('請輸入管理 PIN：');
        if (input !== ADMIN_PIN) { alert('PIN 錯誤'); return; }
      }
      const ref = db.collection(COLLECTION).doc(id);
      try {
        if (action === 'start') {
          await ref.update({ status: 'serving', startedAt: firebase.firestore.FieldValue.serverTimestamp() });
        } else if (action === 'done') {
          await ref.update({ status: 'done', finishedAt: firebase.firestore.FieldValue.serverTimestamp() });
          if (Notification.permission === 'granted') {
            new Notification('列印完成', { body: d.text || '' });
          }
        } else if (action === 'pause') {
          await ref.update({ status: 'waiting' });
        } else if (action === 'restore') {
          await ref.update({ status: 'waiting', finishedAt: null });
        } else if (action === 'remove') {
          await ref.delete();
        }
      } catch (e) {
        console.error(e);
        alert('操作失敗：' + e.message);
      }
    }

    // ======= 「開始下一位」不需要 PIN =======
    document.getElementById('btnStartNext').addEventListener('click', async () => {
      try {
        const snap = await db.collection(COLLECTION).where('status', '==', 'waiting').orderBy('order').limit(1).get();
        if (snap.empty) { alert('沒有等待中的項目'); return; }
        const doc = snap.docs[0];
        await doc.ref.update({ status: 'serving', startedAt: firebase.firestore.FieldValue.serverTimestamp() });
      } catch (e) {
        console.error(e);
        alert('開始下一位失敗：' + e.message);
      }
    });

    document.getElementById('btnExportCSV').addEventListener('click', async () => {
      try {
        const snap = await db.collection(COLLECTION).orderBy('order').get();
        const rows = [['id','text','etaMin','material','status','createdAt','startedAt','finishedAt','order']];
        snap.forEach(doc => {
          const d = doc.data();
          rows.push([
            doc.id,
            (d.text || '').replace(/"/g,'""'),
            d.etaMin ?? '',
            d.material ?? '',
            d.status ?? '',
            ts2(d.createdAt),
            ts2(d.startedAt),
            ts2(d.finishedAt),
            d.order ?? ''
          ]);
        });
        downloadCSV(rows);
      } catch (e) {
        console.error(e);
        alert('匯出失敗：' + e.message);
      }
    });
    document.getElementById('btnExportDone').addEventListener('click', async () => {
      const startStr = prompt('起始日期（YYYY-MM-DD），例：2025-01-01：');
      if (startStr === null) return;
      const endStr = prompt('結束日期（YYYY-MM-DD），例：2025-12-31：');
      if (endStr === null) return;
      const start = new Date(startStr + 'T00:00:00');
      const end = new Date(endStr + 'T23:59:59');
      if (isNaN(start) || isNaN(end)) { alert('日期格式錯誤'); return; }
      try {
        const snap = await db.collection(COLLECTION)
          .where('status', '==', 'done')
          .where('finishedAt', '>=', firebase.firestore.Timestamp.fromDate(start))
          .where('finishedAt', '<=', firebase.firestore.Timestamp.fromDate(end))
          .orderBy('finishedAt', 'asc')
          .get();
        const rows = [['id','text','etaMin','material','finishedAt','usedMin']];
        snap.forEach(doc => {
          const d = doc.data();
          const usedMin = (d.startedAt && d.finishedAt)
            ? Math.round(((d.finishedAt.seconds*1000) - (d.startedAt.seconds*1000)) / 60000)
            : '';
          rows.push([
            doc.id,
            (d.text || '').replace(/"/g,'""'),
            d.etaMin ?? '',
            d.material ?? '',
            ts2(d.finishedAt),
            usedMin
          ]);
        });
        downloadCSV(rows);
      } catch (e) {
        console.error(e);
        alert('匯出失敗：' + e.message);
      }
    });
    function ts2(ts) {
      if (!ts) return '';
      const ms = ts.seconds ? ts.seconds * 1000 : ts;
      return new Date(ms).toISOString();
    }
    function downloadCSV(rows) {
      const csv = rows.map(r => r.map(x => `"${x}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `queue_${QUEUE_ID}_${Date.now()}.csv`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }
  </script>
</body>
</html>
